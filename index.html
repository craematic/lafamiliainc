<script>
// Audio & Visualizer Setup
const audio = document.getElementById('audioPlayer');
const canvas = document.getElementById('visualizer');
const ctx = canvas.getContext('2d');
let audioCtx, analyser, source;

function initAudioContext(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    source = audioCtx.createMediaElementSource(audio);
    analyser = audioCtx.createAnalyser();
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    analyser.fftSize = 256;
    drawVisualizer();
  }
}

const bufferLength = 128;
const dataArray = new Uint8Array(bufferLength);
function drawVisualizer(){
  if(!analyser) return;
  requestAnimationFrame(drawVisualizer);
  analyser.getByteFrequencyData(dataArray);
  ctx.fillStyle = '#0b0b0b';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  const barWidth = (canvas.width / bufferLength) * 2.5;
  let x = 0;
  for(let i=0;i<bufferLength;i++){
    const barHeight = dataArray[i]/2;
    ctx.fillStyle = '#1db954';
    ctx.fillRect(x, canvas.height-barHeight, barWidth, barHeight);
    x+=barWidth+1;
  }
}

function playSong(url,title){
  initAudioContext();
  audioCtx.resume().then(()=>{
    const trimmedUrl = url.split('#')[0];
    audio.src = trimmedUrl;
    audio.play();
    document.getElementById('currentSong').innerText = 'Now Playing: ' + title;
  });
}

function searchContent(q){
  q=q.toLowerCase();
  let blocks=document.querySelectorAll('.artist,.post');
  blocks.forEach(b=>{if(b.innerText.toLowerCase().includes(q)){b.style.display='block'}else{b.style.display='none'});
}
</script>
