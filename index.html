<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaFamiliaINC</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Poppins;background:#0b0b0b;color:white}
header{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;padding:15px;background:#111;border-bottom:1px solid #222}
.logo{font-weight:700;font-size:22px;color:#1db954}
nav a{margin-left:15px;color:white;text-decoration:none;font-size:14px}
.search{padding:8px;border-radius:10px;border:none;width:180px}
.container{max-width:1100px;margin:auto;padding:20px}
.song{background:#151515;padding:15px;border-radius:12px;margin-bottom:12px}
button{padding:8px 14px;border:none;border-radius:8px;background:#1db954;color:white;cursor:pointer;margin-top:5px}
.player{position:fixed;bottom:0;width:100%;background:#121212;border-top:1px solid #222;padding:15px}
.controls{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.visualizer{width:100%;height:60px;background:#000;border-radius:8px;margin-top:10px}
.rating span{cursor:pointer;font-size:18px}
.comment{font-size:13px;color:#ccc;margin-top:5px}
.artistCard{background:#151515;padding:15px;border-radius:12px;margin-bottom:10px}
.trending{background:#151515;padding:15px;border-radius:12px;margin-bottom:20px}
@media(max-width:700px){nav{width:100%;margin-top:10px}}
</style>
</head>

<body>

<header>
<div class="logo">LaFamiliaINC</div>
<input class="search" placeholder="Search music" onkeyup="searchSongs(this.value)">
<nav>
<a href="#music">Music</a>
<a href="#artists">Artists</a>
<a href="#account">Account</a>
</nav>
</header>

<div class="container">
<div class="trending">
<h3>🔥 Trending Songs</h3>
<div id="trending"></div>
</div>
</div>

<div class="container" id="music">
<h2>Stream Music</h2>
<div id="songList"></div>
</div>

<div class="container" id="artists">
<h2>Artists</h2>
<div class="artistCard">Str8faceMafia — Trap / Hip‑Hop</div>
<div class="artistCard">Mervoh — Emotional Hip‑Hop</div>
<div class="artistCard">Xucre — R&B / Alternative</div>
<div class="artistCard">Stonfyo Loving — Afro Fusion</div>
<div class="artistCard">Lo Key — Afrobeat</div>
<div class="artistCard">Skyson — Hip‑Hop</div>
</div>

<div class="container" id="account">
<h2>User Account</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Create Account</button>
<button onclick="login()">Login</button>

<h3>Your Playlist</h3>
<div id="playlist"></div>
</div>

<div class="player">
<div id="nowPlaying">Nothing playing</div>
<audio id="audio" crossorigin="anonymous"></audio>

<canvas id="visualizer" class="visualizer"></canvas>

<div class="controls">
<button onclick="togglePlay()">Play/Pause</button>
<button onclick="prevSong()">Prev</button>
<button onclick="nextSong()">Next</button>
<button onclick="shuffleSongs()">Shuffle</button>
<button onclick="repeatSong()">Repeat</button>
<button onclick="saveToPlaylist()">➕ Playlist</button>
<button onclick="shareTikTok()">TikTok</button>
<button onclick="shareFacebook()">Facebook</button>
</div>

<div class="rating" id="rating"></div>
</div>

<script>

const firebaseConfig={apiKey:"ADD_KEY",authDomain:"ADD_DOMAIN",projectId:"ADD_ID"}
firebase.initializeApp(firebaseConfig)
const auth=firebase.auth()
const db=firebase.firestore()

function register(){
let e=email.value
let p=password.value
auth.createUserWithEmailAndPassword(e,p)
.then(()=>alert("Account created"))
.catch(err=>alert(err.message))
}

function login(){
let e=email.value
let p=password.value
auth.signInWithEmailAndPassword(e,p)
.then(()=>loadPlaylist())
.catch(err=>alert(err.message))
}

function gdrive(id){return `https://drive.google.com/uc?export=download&id=${id}`}

let songs=[
{artist:"Mervoh",title:"Beautiful Mistake",url:gdrive("1v0hDBFGQ6op72PZ3_LU4nXRy2K6iHpQC"),plays:0},
{artist:"Str8faceMafia",title:"Loyalty",url:gdrive("1xu6BNTW1GvXBOQ85dwk1qQgNyoSPnlY0"),plays:0},
{artist:"Str8faceMafia",title:"Velvet Warnings Remix",url:gdrive("1QvqR-_9ZHhJfXf7-E5oZu_inoI8tvw5_"),plays:0},
{artist:"Str8faceMafia",title:"100 Racks",url:gdrive("1jDtSn2YwbVHdm0kvEjd5Nj3sLVN6_EeP"),plays:0},
{artist:"Xucre",title:"Dripping Goddess",url:gdrive("1_nLAWH8pCRrKlx1HzD6OlvDxONZccPlB"),plays:0},
{artist:"Skyson",title:"Freestyle",url:gdrive("1_3GuOxQUwBPeGnjP9bW1rt_IDI53sFgJ"),plays:0}
]

let currentIndex=0
const audio=document.getElementById("audio")

function renderSongs(){
let list=document.getElementById("songList")
list.innerHTML=""

songs.forEach((s,i)=>{
let div=document.createElement("div")
div.className="song"

div.innerHTML=`<strong>${s.title}</strong> — ${s.artist}
<button onclick="playSong(${i})">Stream</button>
<button onclick="addComment(${i})">Comment</button>
<div id="comments-${i}"></div>`

list.appendChild(div)
})

updateTrending()
}

renderSongs()

function playSong(i){
currentIndex=i
let s=songs[i]
s.plays++
audio.src=s.url
nowPlaying.innerText=`Now Playing: ${s.title} — ${s.artist}`
audio.play()
updateTrending()
}

function togglePlay(){if(audio.paused)audio.play();else audio.pause()}

function nextSong(){currentIndex=(currentIndex+1)%songs.length;playSong(currentIndex)}

function prevSong(){currentIndex=(currentIndex-1+songs.length)%songs.length;playSong(currentIndex)}

function shuffleSongs(){songs.sort(()=>Math.random()-0.5);renderSongs()}

function repeatSong(){audio.loop=!audio.loop}

function searchSongs(q){
q=q.toLowerCase()
document.querySelectorAll('.song').forEach(el=>{
if(el.innerText.toLowerCase().includes(q))el.style.display='block'
else el.style.display='none'
})
}

function addComment(i){
let text=prompt("Write a comment")
if(!text)return

let div=document.createElement("div")
div.className="comment"
div.innerText="💬 "+text

document.getElementById(`comments-${i}`).appendChild(div)
}

function saveToPlaylist(){
let user=auth.currentUser
if(!user)return alert("Login first")

let s=songs[currentIndex]

db.collection("playlists").add({
uid:user.uid,
title:s.title,
artist:s.artist,
url:s.url
}).then(()=>loadPlaylist())
}

function loadPlaylist(){
let user=auth.currentUser
if(!user)return

let box=document.getElementById("playlist")
box.innerHTML=""

 db.collection("playlists")
 .where("uid","==",user.uid)
 .get()
 .then(snapshot=>{
 snapshot.forEach(doc=>{
 let s=doc.data()
 let div=document.createElement("div")
 div.innerHTML=`${s.title} — ${s.artist}`
 box.appendChild(div)
 })
 })
}

function shareTikTok(){
let s=songs[currentIndex]
let url=`https://www.tiktok.com/upload?title=${encodeURIComponent(s.title)}`
window.open(url)
}

function shareFacebook(){
let s=songs[currentIndex]
let url=`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(s.url)}`
window.open(url)
}

function updateTrending(){
let top=[...songs].sort((a,b)=>b.plays-a.plays).slice(0,5)

let box=document.getElementById("trending")
box.innerHTML=""

top.forEach(s=>{
let div=document.createElement("div")
div.innerText=`${s.title} — ${s.artist} (${s.plays} plays)`
box.appendChild(div)
})
}

const ctx=document.getElementById('visualizer').getContext('2d')
const audioCtx=new AudioContext()
const src=audioCtx.createMediaElementSource(audio)
const analyser=audioCtx.createAnalyser()
src.connect(analyser)
analyser.connect(audioCtx.destination)
analyser.fftSize=64

const bufferLength=analyser.frequencyBinCount
const dataArray=new Uint8Array(bufferLength)

function draw(){
requestAnimationFrame(draw)
analyser.getByteFrequencyData(dataArray)
ctx.clearRect(0,0,500,60)
let barWidth=500/bufferLength
for(let i=0;i<bufferLength;i++){
let h=dataArray[i]/2
ctx.fillStyle="#1db954"
ctx.fillRect(i*barWidth,60-h,barWidth-2,h)
}
}

draw()

for(let i=1;i<=5;i++){
let star=document.createElement("span")
star.innerText="★"
star.onclick=()=>alert("Rated "+i+" stars")
rating.appendChild(star)
}

</script>

</body>
</html>
