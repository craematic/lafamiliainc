<script>
// Firebase config (replace with your keys)
const firebaseConfig = {
apiKey: "ADD_KEY",
authDomain: "ADD_DOMAIN",
projectId: "ADD_ID"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
function register(){let email=document.getElementById("email").value;let pass=document.getElementById("password").value;auth.createUserWithEmailAndPassword(email,pass).then(()=>alert("Account created")).catch(e=>alert(e.message));}
function login(){let email=document.getElementById("email").value;let pass=document.getElementById("password").value;auth.signInWithEmailAndPassword(email,pass).then(()=>alert("Logged in")).catch(e=>alert(e.message));}
function createPost(){let text=document.getElementById("postText").value;if(text.length<1)return;db.collection("posts").add({text:text,time:Date.now()});document.getElementById("postText").value="";}
function loadPosts(){db.collection("posts").orderBy("time","desc").onSnapshot(snapshot=>{let posts=document.getElementById("posts");posts.innerHTML="";snapshot.forEach(doc=>{let p=document.createElement("div");p.className="post";p.innerHTML=`<p>${doc.data().text}</p><input placeholder="comment"><button onclick="comment(this)">Reply</button>`;posts.appendChild(p);});});}
loadPosts();
function comment(btn){let input=btn.previousElementSibling;let c=document.createElement("div");c.className="comment";c.innerText="💬 "+input.value;btn.parentElement.appendChild(c);input.value="";}
function playSong(url){let player=document.getElementById("audioPlayer");player.src=url;player.play();}
function searchContent(q){q=q.toLowerCase();let blocks=document.querySelectorAll(".artist,.post");blocks.forEach(b=>{if(b.innerText.toLowerCase().includes(q)){b.style.display="block"}else{b.style.display="none"}});}
if('serviceWorker' in navigator){navigator.serviceWorker.register('service-worker.js');}
</script>
