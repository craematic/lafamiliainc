<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaFamiliaINC</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Poppins;background:#0b0b0b;color:white}
header{display:flex;justify-content:space-between;align-items:center;padding:15px 25px;background:#111;border-bottom:1px solid #222}
.logo{font-weight:600;color:#1db954;font-size:22px}
.search{padding:8px 10px;border-radius:6px;border:none;background:#1a1a1a;color:white}

.layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 110px)}

.sidebar{background:#0f0f0f;padding:20px;border-right:1px solid #1d1d1d}
.sidebar h3{font-size:14px;color:#aaa}
.sidebar div{margin:10px 0;cursor:pointer}
.sidebar div:hover{color:#1db954}

.main{padding:25px}

.song{background:#151515;padding:12px;border-radius:10px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}

button{background:#1db954;border:none;padding:6px 10px;border-radius:6px;color:white;cursor:pointer}
button:hover{opacity:.9}

.player{position:fixed;bottom:0;left:0;width:100%;background:#121212;border-top:1px solid #222;padding:10px}

canvas{width:100%;height:60px;background:black;border-radius:6px;margin-top:6px}

.artistTitle{font-size:26px;margin-bottom:20px}

</style>
</head>

<body>

<header>
<div class="logo">LaFamiliaINC</div>
<input class="search" placeholder="Search" onkeyup="searchSongs(this.value)">
</header>

<div class="layout">

<div class="sidebar">
<h3>Artists</h3>
<div onclick="openArtist('Str8faceMafia')">Str8faceMafia</div>
<div onclick="openArtist('Mervoh')">Mervoh</div>
<div onclick="openArtist('Xucre')">Xucre</div>
<div onclick="openArtist('Stonfyo Loving')">Stonfyo Loving</div>
<div onclick="openArtist('Lo Key')">Lo Key</div>
<div onclick="openArtist('Skyson')">Skyson</div>
</div>

<div class="main">

<div id="home">
<h2>All Songs</h2>
<div id="songList"></div>
</div>

<div id="artistPage" style="display:none">
<div class="artistTitle" id="artistName"></div>
<div id="artistSongs"></div>
<button onclick="goHome()">Back</button>
</div>

</div>

</div>

<div class="player">
<div id="nowPlaying">Nothing playing</div>
<audio id="audio" controls style="width:100%"></audio>
<canvas id="visualizer"></canvas>
</div>

<script>

function gdrive(id){
// Google Drive direct streaming format
return `https://docs.google.com/uc?export=open&id=${id}`
}

let songs=[
{artist:"Str8faceMafia",title:"100 Racks",url:gdrive("1jDtSn2YwbVHdm0kvEjd5Nj3sLVN6_EeP")},
{artist:"Str8faceMafia",title:"Loyalty",url:gdrive("1xu6BNTW1GvXBOQ85dwk1qQgNyoSPnlY0")},
{artist:"Str8faceMafia",title:"Matte Black",url:gdrive("1U8_Q28wPCUMUqo3qJw_iBrgtpowLnLAL")},
{artist:"Mervoh",title:"Beautiful Mistake",url:gdrive("1v0hDBFGQ6op72PZ3_LU4nXRy2K6iHpQC")},
{artist:"Xucre",title:"Dripping Goddess",url:gdrive("1_nLAWH8pCRrKlx1HzD6OlvDxONZccPlB")},
{artist:"Skyson",title:"Freestyle",url:gdrive("1_3GuOxQUwBPeGnjP9bW1rt_IDI53sFgJ")},
{artist:"Lo Key",title:"Moto Chini",url:gdrive("1S3sa-4Y_aEr5g4qbWJlF7GjOWbhWzzCL")},
{artist:"Stonfyo Loving",title:"African Original",url:gdrive("1HiiOGJq8DpiSrzX7NWT9oDHGqGmOwalE")}
]

let currentIndex=0
const audio=document.getElementById("audio")

function renderSongs(list=songs){
let box=document.getElementById("songList")
box.innerHTML=""

list.forEach((s,i)=>{
let div=document.createElement("div")
div.className="song"

div.innerHTML=`
<span>${s.title} — ${s.artist}</span>
<button onclick="playSong(${i})">Play</button>
`

box.appendChild(div)
})
}

renderSongs()

function playSong(i){
currentIndex=i
let s=songs[i]

audio.src=s.url

audio.play()

nowPlaying.innerText=`Now Playing: ${s.title} — ${s.artist}`

startVisualizer()
}

function searchSongs(q){
q=q.toLowerCase()

let filtered=songs.filter(s=>
s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q)
)

renderSongs(filtered)
}

function openArtist(name){

let filtered=songs.filter(s=>s.artist===name)

artistName.innerText=name

let box=document.getElementById("artistSongs")
box.innerHTML=""

filtered.forEach(s=>{
let index=songs.indexOf(s)

let div=document.createElement("div")

div.className="song"

div.innerHTML=`
<span>${s.title}</span>
<button onclick="playSong(${index})">Play</button>
`

box.appendChild(div)
})

home.style.display="none"
artistPage.style.display="block"
}

function goHome(){
artistPage.style.display="none"
home.style.display="block"
}

const canvas=document.getElementById("visualizer")
const ctx=canvas.getContext("2d")

let audioCtx, analyser, source

function startVisualizer(){

if(!audioCtx){
 audioCtx=new AudioContext()
 source=audioCtx.createMediaElementSource(audio)
 analyser=audioCtx.createAnalyser()

 source.connect(analyser)
 analyser.connect(audioCtx.destination)

 analyser.fftSize=64
}

const bufferLength=analyser.frequencyBinCount
const dataArray=new Uint8Array(bufferLength)

function draw(){

requestAnimationFrame(draw)

analyser.getByteFrequencyData(dataArray)

ctx.clearRect(0,0,canvas.width,canvas.height)

let barWidth=(canvas.width/bufferLength)

for(let i=0;i<bufferLength;i++){

let h=dataArray[i]/2

ctx.fillStyle="#1db954"

ctx.fillRect(i*barWidth,canvas.height-h,barWidth-2,h)

}

}

 draw()

}

</script>

</body>
</html>
